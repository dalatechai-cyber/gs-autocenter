<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#131313">
    <title>GS Auto Center · Онлайн туслах</title>
    <meta name="description" content="GS Auto Center — TOYOTA, LEXUS жийп ангиллын мэргэжлийн засвар үйлчилгээний AI туслах. JAPAN TOK оригинал сэлбэг. Утас +976 77-200-570.">
    <link rel="icon" type="image/png" href="/logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;700;800&display=swap">
    <link rel="stylesheet" href="custom.css">
</head>
<body>
    <main class="dt-shell" role="main" aria-label="GS Auto Center онлайн туслах">
        <header class="dt-header">
            <div class="dt-brand">
                <span class="dt-avatar" aria-hidden="true">
                    <svg viewBox="0 0 40 40" width="40" height="40" focusable="false">
                        <defs>
                            <radialGradient id="dt-avatar-core" cx="50%" cy="50%" r="50%">
                                <stop offset="0%" stop-color="#FCA5A5" stop-opacity="1"/>
                                <stop offset="55%" stop-color="#DC0D01" stop-opacity="0.95"/>
                                <stop offset="100%" stop-color="#5B0702" stop-opacity="0"/>
                            </radialGradient>
                        </defs>
                        <circle cx="20" cy="20" r="9" fill="url(#dt-avatar-core)">
                            <animate attributeName="r" values="8;10;8" dur="2.6s" repeatCount="indefinite"/>
                        </circle>
                        <g fill="none" stroke="#DC0D01" stroke-width="1" stroke-linecap="round" opacity="0.55">
                            <circle cx="20" cy="20" r="14" stroke-dasharray="22 66">
                                <animateTransform attributeName="transform" type="rotate" from="0 20 20" to="360 20 20" dur="9s" repeatCount="indefinite"/>
                            </circle>
                        </g>
                    </svg>
                </span>
                <div class="dt-brand-meta">
                    <h1 class="dt-wordmark">GS Auto Center</h1>
                    <p class="dt-status">
                        <span id="connection-status" class="dt-status-dot" aria-hidden="true"></span>
                        <span id="status-text">Онлайн</span>
                    </p>
                </div>
            </div>
            <div class="dt-header-actions">
                <span id="sheet-indicator" class="dt-pill" aria-hidden="true">Toyota · Lexus</span>
                <button id="clear-chat-btn" type="button" class="dt-icon-btn" title="Шинэ яриа" aria-label="Шинэ яриа эхлүүлэх">
                    <svg viewBox="0 0 20 20" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="M3 6h14"/>
                        <path d="M8 6V4.5A1.5 1.5 0 0 1 9.5 3h1A1.5 1.5 0 0 1 12 4.5V6"/>
                        <path d="M5 6l1 10.2A1.8 1.8 0 0 0 7.8 18h4.4a1.8 1.8 0 0 0 1.8-1.8L15 6"/>
                    </svg>
                </button>
            </div>
        </header>

        <div id="chat-messages" class="dt-messages" role="log" aria-live="polite">
            <div class="dt-empty">
                <div class="dt-empty-orb" aria-hidden="true">
                    <svg viewBox="0 0 96 96" width="96" height="96" focusable="false">
                        <defs>
                            <radialGradient id="dt-empty-glow" cx="50%" cy="50%" r="50%">
                                <stop offset="0%" stop-color="#FCA5A5" stop-opacity="0.95"/>
                                <stop offset="50%" stop-color="#DC0D01" stop-opacity="0.55"/>
                                <stop offset="100%" stop-color="#5B0702" stop-opacity="0"/>
                            </radialGradient>
                        </defs>
                        <circle cx="48" cy="48" r="22" fill="url(#dt-empty-glow)">
                            <animate attributeName="r" values="20;26;20" dur="3.2s" repeatCount="indefinite"/>
                            <animate attributeName="opacity" values="0.85;1;0.85" dur="3.2s" repeatCount="indefinite"/>
                        </circle>
                        <g fill="none" stroke="#DC0D01" stroke-linecap="round">
                            <circle cx="48" cy="48" r="34" stroke-width="0.8" stroke-dasharray="44 170" opacity="0.7">
                                <animateTransform attributeName="transform" type="rotate" from="0 48 48" to="360 48 48" dur="11s" repeatCount="indefinite"/>
                            </circle>
                            <circle cx="48" cy="48" r="42" stroke-width="0.6" stroke-dasharray="14 250" opacity="0.5">
                                <animateTransform attributeName="transform" type="rotate" from="360 48 48" to="0 48 48" dur="14s" repeatCount="indefinite"/>
                            </circle>
                        </g>
                    </svg>
                </div>
                <h2 class="dt-empty-title">Сайн байна уу 👋</h2>
                <p class="dt-empty-copy">Би <b>GS Auto Center</b>-ийн онлайн туслах. TOYOTA, LEXUS жийпийн засвар, JAPAN TOK сэлбэг, цаг захиалга — танд яаж туслах вэ?</p>
            </div>
        </div>

        <div id="quick-replies" class="dt-quick" role="group" aria-label="Шуурхай товч">
            <button type="button" class="quick-reply-btn dt-quick-btn">🔧 Үйлчилгээ</button>
            <button type="button" class="quick-reply-btn dt-quick-btn">🛠️ JAPAN TOK сэлбэг</button>
            <button type="button" class="quick-reply-btn dt-quick-btn">📍 Байршил, цаг</button>
            <button type="button" class="quick-reply-btn dt-quick-btn">📞 Цаг захиалах</button>
        </div>

        <form id="chat-form" class="dt-input-row" autocomplete="off">
            <div class="dt-input-wrap">
                <input type="text" id="user-input" class="dt-input" placeholder="Асуултаа бичээрэй..." required autocomplete="off" disabled aria-label="Зурвас бичих" maxlength="2000">
                <button type="submit" id="send-button" class="dt-send" disabled aria-label="Илгээх">
                    <svg viewBox="0 0 20 20" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="M3.5 10h13"/>
                        <path d="M11.5 5l5 5-5 5"/>
                    </svg>
                </button>
            </div>
            <p class="dt-foot-line">
                <span class="dt-foot-dot" aria-hidden="true"></span>
                Powered by <a href="https://www.dalatech.online/" target="_blank" rel="noopener noreferrer">dalatech.ai</a>
            </p>
        </form>

        <div id="loader" class="dt-loader dt-hidden" aria-hidden="true">
            <div class="dt-loader-bar"></div>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
